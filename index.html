<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixpick 프로토타입 v1.4</title>
<style>
  :root{--bg:#eceef2;--ink:#242830;--sub:#868c96;--line:#e2e6eb;--card:#fff;--ph:#eef0f3;
    --accent:#6b4eff;--free:#0ea5a4;--credit:#6b4eff;--team:#f59e0b;--allin:#e11d8f;--new:#22c55e;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Pretendard','Malgun Gothic',system-ui,sans-serif;padding:22px;height:100vh;overflow:hidden}
  .win{max-width:1080px;height:calc(100vh - 44px);margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 12px 40px rgba(30,30,60,.14);display:flex;flex-direction:column}
  .chrome{display:flex;align-items:center;gap:7px;padding:10px 14px;background:#f7f8fa;border-bottom:1px solid var(--line);flex-shrink:0}
  .chrome i{width:10px;height:10px;border-radius:50%;background:#d6dae0}
  .chrome .u{flex:1;margin-left:10px;height:20px;background:#eef0f3;border-radius:8px}
  .app{flex:1;display:flex;min-height:0}
  /* in-app nav */
  .nav{width:216px;background:#fbfbfd;border-right:1px solid var(--line);padding:12px 9px;overflow-y:auto;flex-shrink:0}
  .brand{font-weight:800;font-size:16px;padding:6px 10px 12px}
  .ng{font-size:10px;color:var(--sub);font-weight:700;margin:12px 8px 5px;text-transform:uppercase;letter-spacing:.04em}
  .ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13px;margin:2px 0;cursor:pointer;color:#3d434c}
  .ni:hover{background:#f0f1f5}
  .ni .ic{width:20px;text-align:center}
  .ni .bg{margin-left:auto;font-size:9px;color:#fff;padding:1px 6px;border-radius:10px}
  .ni.on{background:#efeaff;color:var(--accent);font-weight:700}
  .ni.allin.on{background:#fce7f3;color:#be185d}
  .b-free{background:var(--free)}.b-credit{background:var(--credit)}.b-team{background:var(--team)}.b-allin{background:var(--allin)}.b-new{background:var(--new)}
  /* main */
  .main{flex:1;overflow-y:auto;padding:26px 30px}
  .h1{font-size:20px;font-weight:800;margin:0 0 3px;display:flex;align-items:center;gap:9px}
  .desc{font-size:13px;color:var(--sub);margin:0 0 18px}
  .tag{font-size:10px;color:#fff;padding:2px 9px;border-radius:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .drop{border:2px dashed #c2c7d0;border-radius:12px;padding:30px;text-align:center;color:#98a0ab;font-size:13px;cursor:pointer}
  .drop:hover{border-color:var(--free);color:var(--free);background:#f0fdfc}
  .files{display:flex;align-items:center;gap:9px;font-size:12px;color:#5a616b;background:#f7f8fa;border-radius:8px;padding:9px 11px;margin-bottom:12px}
  .thumb{width:22px;height:22px;background:#e0e3e8;border-radius:5px}
  .btn{border:none;border-radius:9px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.06)}
  .btn.free{background:var(--free)}.btn.ghost{background:#eceef2;color:#5a616b}.btn.team{background:var(--team)}.btn.danger{background:#ef4444}
  .btn.full{width:100%}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{font-size:12px;padding:6px 12px;border-radius:20px;background:#eef0f3;color:#6b7280;cursor:pointer}
  .chip.sel{background:var(--free);color:#fff}
  .opt{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid #f0f2f5}
  .opt:first-of-type{border-top:none}
  .sw{width:36px;height:21px;border-radius:20px;background:#cfd4db;position:relative;flex-shrink:0;cursor:pointer;transition:.15s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.15s}
  .sw.on{background:var(--free)}.sw.on::after{left:17px}
  .opt .t{font-size:13px;font-weight:600}.opt .s{font-size:11px;color:var(--sub)}
  .field{background:var(--ph);border:1px solid #e3e6ea;border-radius:8px;padding:11px;font-size:12px;color:#8a909a;margin-bottom:8px}
  .ph{background:var(--ph);border:1px dashed #c7ccd4;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#a5abb5;font-size:12px;text-align:center;padding:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  .tpl{aspect-ratio:1/1.2;border:2px solid #e3e6ea;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#8a909a;cursor:pointer;background:#f7f8fa;text-align:center;padding:4px}
  .tpl.sel{border-color:var(--free);background:#effdfb;color:var(--free);font-weight:600}
  .warn{background:#fef9ec;border:1px solid #fde8b0;color:#a16207;border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:12px}
  .safe{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:14px}
  .spinner{width:46px;height:46px;border:5px solid #e7e9ee;border-top-color:var(--accent);border-radius:50%;margin:20px auto;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .prog{height:12px;background:#e7e9ee;border-radius:6px;overflow:hidden;max-width:340px;margin:0 auto}.prog>span{display:block;height:100%;background:var(--free);width:64%}
  .cardset{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cardset .cn{aspect-ratio:1/1.2;background:linear-gradient(135deg,#efeaff,#e6f7f6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#7a7f98}
  .hint{font-size:11px;color:var(--sub);text-align:center;margin-top:10px}
  .previewlist{font-size:12px;color:#5a616b}
  .previewlist div{padding:5px 8px;background:#f7f8fa;border-radius:6px;margin-bottom:4px}
</style>
</head>
<body>
  <div class="win">
    <div class="chrome"><i></i><i></i><i></i><div class="u"></div></div>
    <div class="app">
      <nav class="nav">
        <div class="brand">⚡ Fixpick</div>
        <div class="ni" data-p="home" onclick="nav('home')"><span class="ic">🏠</span>홈 / 업로드</div>
        <div class="ni allin" data-p="allinone" onclick="nav('allinone')"><span class="ic">⚡</span>올인원<span class="bg b-allin">킬러</span></div>
        <div class="ng">개별 기능</div>
        <div class="ni" data-p="resize" onclick="nav('resize')"><span class="ic">📐</span>이미지 리사이징</div>
        <div class="ni" data-p="exif" onclick="nav('exif')"><span class="ic">📍</span>EXIF 소거</div>
        <div class="ni" data-p="pad" onclick="nav('pad')"><span class="ic">🖼</span>여백 패딩</div>
        <div class="ni" data-p="rename" onclick="nav('rename')"><span class="ic">🏷</span>스마트 리네이밍</div>
        <div class="ni" data-p="cardnews" onclick="nav('cardnews')"><span class="ic">🎴</span>카드뉴스<span class="bg b-new">NEW</span></div>
        <div class="ng">유료</div>
        <div class="ni" data-p="presets" onclick="nav('presets')"><span class="ic">👥</span>팀 프리셋<span class="bg b-team">Team</span></div>
        <div class="ni" data-p="ai" onclick="nav('ai')"><span class="ic">✨</span>AI 프리미엄<span class="bg b-credit">크레딧</span></div>
      </nav>
      <main class="main" id="main"></main>
    </div>
  </div>
<script>
const up = `<div class="files"><span class="thumb"></span>photo_01.jpg · photo_02.png … <b style="margin-left:auto">12장 업로드됨</b></div>`;
const P = {
  home:()=>`
    <div class="h1">🏠 홈</div>
    <p class="desc">회원가입 없이 바로 시작 — 파일을 올리고 왼쪽에서 원하는 기능을 선택하세요.</p>
    <div class="card"><div class="drop" onclick="nav('allinone')">⬆ 여기로 파일을 끌어다 놓거나 클릭</div></div>
    <div class="grid4">
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('resize')">📐<br>리사이징</div>
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('exif')">📍<br>EXIF 소거</div>
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('pad')">🖼<br>여백 패딩</div>
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('rename')">🏷<br>리네이밍</div>
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('cardnews')">🎴<br>카드뉴스</div>
      <div class="tpl" style="aspect-ratio:auto;padding:14px" onclick="nav('allinone')">⚡<br>올인원</div>
    </div>`,

  allinone:()=>`
    <div class="h1">⚡ 올인원 <span class="tag" style="background:var(--allin)">원패스 · 킬러</span></div>
    <p class="desc">업로드 한 번으로 4작업을 동시에. 각 기능을 켜고 옵션을 조정하세요.</p>
    ${up}
    <div class="card">
      <div class="opt"><span class="sw on" onclick="tg(this)"></span><div><div class="t">멀티 규격 리사이징</div><div class="s">인스타 1:1 · 릴스 9:16 선택됨</div></div></div>
      <div class="opt"><span class="sw on" onclick="tg(this)"></span><div><div class="t">EXIF 위치정보 소거</div><div class="s">GPS 3장 감지 · 자동 제거</div></div></div>
      <div class="opt"><span class="sw" onclick="tg(this)"></span><div><div class="t">여백 패딩</div><div class="s">보고서·PPT 규격</div></div></div>
      <div class="opt"><span class="sw" onclick="tg(this)"></span><div><div class="t">스마트 리네이밍</div><div class="s">접두사+연번+날짜</div></div></div>
    </div>
    <button class="btn free full" onclick="run('allinone')">처리 실행 ▶</button>`,

  resize:()=>`
    <div class="h1">📐 이미지 리사이징 <span class="tag" style="background:var(--free)">무료</span></div>
    <p class="desc">채널 규격을 여러 개 골라 한 번에 규격별로 출력해요. (팀원 A 담당)</p>
    ${up}
    <div class="card">
      <div class="opt" style="border:none;padding-top:0;display:block"><div class="t" style="margin-bottom:9px">출력 규격 (다중 선택)</div>
        <div class="chips"><span class="chip sel" onclick="cs(this)">인스타 1:1</span><span class="chip sel" onclick="cs(this)">릴스 9:16</span><span class="chip" onclick="cs(this)">유튜브 16:9</span><span class="chip" onclick="cs(this)">상세페이지</span><span class="chip" onclick="cs(this)">＋커스텀 px</span></div></div>
      <div class="opt"><span class="sw on" onclick="tg(this)"></span><div><div class="t">화질 유지 리샘플</div></div></div>
      <div class="opt"><span class="sw on" onclick="tg(this)"></span><div><div class="t">세로 사진 자동 회전 보정</div><div class="s">orientation 방어 — 폰 사진 눕지 않게</div></div></div>
    </div>
    <button class="btn free full" onclick="run('resize')">처리 실행 ▶</button>`,

  exif:()=>`
    <div class="h1">📍 EXIF 소거 <span class="tag" style="background:var(--free)">무료</span></div>
    <p class="desc">사진에 담긴 위치·기기 정보를 제거해요. (팀원 B 담당 · ZIP 공통 모듈 포함)</p>
    ${up}
    <div class="warn">⚠ GPS 위치정보 포함 3장 감지됨 — 외부 공유 전 제거를 권장합니다</div>
    <div class="card"><div class="grid2"><div class="ph" style="height:90px">Before<br>GPS·기기·시각 포함</div><div class="ph" style="height:90px;border-color:var(--free);color:var(--free)">After<br>메타데이터 제거</div></div></div>
    <button class="btn free full" onclick="run('exif')">위치정보 제거 ▶</button>`,

  pad:()=>`
    <div class="h1">🖼 여백 패딩 <span class="tag" style="background:var(--free)">무료</span></div>
    <p class="desc">보고서·PPT 규격에 맞춰 이미지 여백(레터박스)을 채워요. (팀원 C 담당)</p>
    ${up}
    <div class="card">
      <div class="t" style="margin-bottom:9px">규격</div>
      <div class="chips" style="margin-bottom:14px"><span class="chip sel" onclick="cs(this)">A4 문서</span><span class="chip" onclick="cs(this)">PPT 16:9</span><span class="chip" onclick="cs(this)">정사각</span></div>
      <div class="t" style="margin-bottom:9px">배경색</div>
      <div class="chips"><span class="chip sel" onclick="cs(this)">흰색</span><span class="chip" onclick="cs(this)">검정</span><span class="chip" onclick="cs(this)">투명</span></div>
    </div>
    <button class="btn free full" onclick="run('pad')">처리 실행 ▶</button>`,

  rename:()=>`
    <div class="h1">🏷 스마트 리네이밍 <span class="tag" style="background:var(--free)">무료</span></div>
    <p class="desc">규칙을 만들어 파일명을 일괄 정리해요. 아래 미리보기가 실시간 반영. (팀원 D 담당)</p>
    ${up}
    <div class="card">
      <div class="chips" style="margin-bottom:14px"><span class="chip sel">접두사 product</span><span class="chip sel">연번 001</span><span class="chip sel">날짜 0723</span><span class="chip" onclick="cs(this)">＋규칙</span></div>
      <div class="t" style="margin-bottom:8px">변경 미리보기</div>
      <div class="previewlist"><div>photo_01.jpg → product_001_0723.jpg</div><div>photo_02.png → product_002_0723.png</div><div>photo_03.jpg → product_003_0723.jpg</div></div>
    </div>
    <button class="btn free full" onclick="run('rename')">이름 일괄 변경 ▶</button>`,

  cardnews:()=>`
    <div class="h1">🎴 카드뉴스 제작 <span class="tag" style="background:var(--new)">NEW</span></div>
    <p class="desc">템플릿을 고르고 텍스트를 넣으면 SNS 규격 카드 세트가 완성돼요. (팀원 E 담당)</p>
    <div class="card">
      <div class="t" style="margin-bottom:10px">1) 템플릿 선택</div>
      <div class="grid4"><div class="tpl sel" onclick="tsel(this)">심플<br>화이트</div><div class="tpl" onclick="tsel(this)">볼드<br>컬러</div><div class="tpl" onclick="tsel(this)">사진<br>배경</div><div class="tpl" onclick="tsel(this)">인용구</div></div>
    </div>
    <div class="card">
      <div class="t" style="margin-bottom:10px">2) 텍스트 입력</div>
      <div class="field">표지 제목 — 예: 신제품 3분 요약</div>
      <div class="field">본문 카드 ① 텍스트</div>
      <div class="field">본문 카드 ② 텍스트</div>
      <div class="chips"><span class="chip sel" onclick="cs(this)">1:1 (인스타)</span><span class="chip" onclick="cs(this)">4:5</span><span class="chip" onclick="cs(this)">9:16</span></div>
    </div>
    <button class="btn free full" onclick="run('cardnews')">카드뉴스 생성 ▶</button>`,

  presets:()=>`
    <div class="h1">👥 팀 프리셋 <span class="tag" style="background:var(--team)">Team · 목업</span></div>
    <p class="desc">부서·팀 규격을 저장·공유하는 협업 락인 기능 (Phase 2 예고).</p>
    <div class="card">
      <div class="files"><span class="thumb"></span>마케팅팀 · 인스타 세트<span style="margin-left:auto">공유중</span></div>
      <div class="files"><span class="thumb"></span>상세페이지 규격<span style="margin-left:auto">공유중</span></div>
      <div class="files"><span class="thumb"></span>로고 워터마크 + 압축률<span style="margin-left:auto">🔒 잠김</span></div>
    </div>
    <button class="btn team full" onclick="nav('allinone')">이 프리셋으로 올인원 시작</button>`,

  ai:()=>`
    <div class="h1">✨ AI 프리미엄 <span class="tag" style="background:var(--credit)">크레딧</span></div>
    <p class="desc">GPU 연산이 필요한 기능만 크레딧 차감. 결제는 토스 샌드박스(실결제 아님).</p>
    <div class="grid2">
      <div class="card" style="text-align:center">✨<br><b>AI 누끼</b><div class="s" style="font-size:11px;color:var(--sub)">배경 자동 제거 · 1크레딧</div></div>
      <div class="card" style="text-align:center">🔍<br><b>AI 업스케일</b><div class="s" style="font-size:11px;color:var(--sub)">최대 8배 · 1크레딧</div></div>
    </div>
    <div class="card"><div class="ph" style="height:50px">크레딧 팩 · 10 / 50 / 200</div></div>
    <button class="btn full" onclick="nav('pay')">크레딧 충전하기</button>`,

  pay:()=>`
    <div class="h1">크레딧 결제 <span class="tag" style="background:#0ea5e9">토스 샌드박스</span></div>
    <p class="desc">결제 흐름만 시연합니다 — 실결제가 아닙니다.</p>
    <div class="card"><div class="ph" style="height:150px">토스페이먼츠 결제창<br>(카드 · 간편결제)</div></div>
    <div class="files">☑ 개인정보 수집 · 결제 안내 동의</div>
    <button class="btn full" onclick="nav('payResult')">결제하기</button>`,

  payResult:()=>`
    <div class="h1">결제 결과</div>
    <div class="safe">✓ 충전 완료 · +50 크레딧이 반영됐습니다</div>
    <button class="btn free" onclick="nav('ai')">AI 기능 사용하러 가기</button>
    <div class="card" style="margin-top:18px"><div style="color:#ef4444;font-size:13px;margin-bottom:10px">✕ (실패 시나리오) 결제 실패</div>
      <div class="row"><button class="btn danger" onclick="nav('pay')">재시도</button><button class="btn ghost" onclick="nav('ai')">돌아가기</button></div></div>`,
};

const NOTE = {
  allinone:'✓ 4작업 완료 · 위치정보 삭제 · 규격별 폴더로 정리됐습니다',
  resize:'✓ 12장을 2개 규격(1:1·9:16)으로 리사이즈했습니다',
  exif:'✓ 위치정보(EXIF)가 12장 모두 깔끔하게 삭제됐습니다',
  pad:'✓ A4 규격 흰 여백으로 패딩 처리됐습니다',
  rename:'✓ 12장 파일명을 규칙대로 정리했습니다',
  cardnews:'✓ 카드뉴스 4장 세트가 생성됐습니다',
};
function result(tool){
  const isCard = tool==='cardnews';
  const preview = isCard
    ? `<div class="cardset"><div class="cn">표지</div><div class="cn">카드 1</div><div class="cn">카드 2</div><div class="cn">카드 3</div></div>`
    : `<div class="grid2"><div class="ph" style="height:80px">미리보기 1</div><div class="ph" style="height:80px">미리보기 2</div></div>`;
  document.getElementById('main').innerHTML=`
    <div class="h1">결과 · 다운로드</div>
    <div class="safe">${NOTE[tool]||'✓ 처리 완료'}</div>
    <div class="card">${preview}</div>
    <div class="row"><button class="btn free" onclick="alert('규격별 폴더 ZIP 다운로드')">${isCard?'카드 세트 다운로드':'ZIP 일괄 다운로드'}</button>
      <button class="btn ghost" onclick="alert('개별 다운로드')">개별</button>
      <button class="btn ghost" onclick="nav('presets')">＋ 프리셋 저장</button></div>
    <p class="hint">← 왼쪽 nav에서 다른 기능을 이어서 사용할 수 있어요 · <a href="#" onclick="nav('${tool}');return false">다시 설정</a></p>`;
}
function run(tool){
  document.getElementById('main').innerHTML=`<div class="h1" style="justify-content:center;margin-top:40px">처리 중…</div>
    <div class="spinner"></div><div class="prog"><span></span></div>
    <p class="hint">브라우저 안에서 처리 중 · 원본은 서버로 전송되지 않아요 · 8/12</p>`;
  setTimeout(()=>result(tool),1600);
}
let cur='home';
function nav(p){cur=p;document.getElementById('main').innerHTML=P[p]();
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('on',n.dataset.p===p));}
function tg(el){el.classList.toggle('on');}
function cs(el){el.classList.toggle('sel');}
function tsel(el){el.parentElement.querySelectorAll('.tpl').forEach(t=>t.classList.remove('sel'));el.classList.add('sel');}
nav('home');
</script>
</body>
</html>
